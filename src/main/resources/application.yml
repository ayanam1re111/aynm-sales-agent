  datasource:
    url: jdbc:mysql://127.0.0.1:3306/aynm-sales-agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PWD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  # SQL 初始化（建表 + 测试数据，IF NOT EXISTS + INSERT IGNORE 安全重复执行）
  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      data-locations: classpath:db/data.sql
      continue-on-error: true

  # JPA
  jpa:
    hibernate:
      ddl-auto: update            # 使用 schema.sql 建表，不用 JPA 自动建表
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    defer-datasource-initialization: false  # 等 JPA 初始化后再执行 SQL 脚本

# LangChain4j OpenAI 兼容接口 → DashScope
langchain4j:
  open-ai:
    chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${API_KEY}
      model-name: deepseek-chat
      temperature: 0.1          # 数据分析场景用低温度，减少随机性
      max-tokens: 2048
    streaming-chat-model:
      base-url: https://api.deepseek.com/v1
      api-key: ${API_KEY}
      model-name: deepseek-chat
      temperature: 0.1
      max-tokens: 2048

# Sa-Token 配置（轻量权限框架）
sa-token:
  token-name: Authorization
  timeout: 86400
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

# Actuator
#开启 Spring Boot 项目的监控功能，并只对外暴露 health、info、metrics 三个监控接口
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      show-details: always

# 应用自定义配置
sales-agent:
  tool:
    anomaly-threshold-days: 5
    trend-drop-threshold: 0.3

logging:
  level:
    com.ayanami.salesAgent: DEBUG
    dev.langchain4j: DEBUG
app:
  auth:
    enabled: false
